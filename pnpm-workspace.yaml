packages:
  - "apps/*"
  - "packages/*"
# Expo / Metro needs a flat node_modules to resolve transitive deps. A single
# @types/react version is pinned via pnpm.overrides so the web app's types stay
# consistent under the hoisted layout (see root package.json).
nodeLinker: hoisted
allowBuilds:
  '@clerk/shared': true
  '@prisma/client': true
  '@prisma/engines': true
  browser-tabs-lock: false
  bufferutil: false
  core-js: false
  esbuild: true
  prisma: true
  sharp: true
  utf-8-validate: false
